apiVersion: apps/v1
kind: Deployment
metadata: 
    name: catalogue
    namespace: roboshop
    labels:
        project: roboshop
        tier: backend
        service: catalogue
spec:
    replicas: 1
    selector:
        matchLabels:
            project: roboshop
            tier: backend
            service: catalogue
    template:
        metadata:
            labels:
                project: roboshop
                tier: backend
                service: catalogue
        spec:
            containers:
                  - name: catalogue
                    image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"
                    imagePullPolicy: Always
                    livenessProbe:
                        httpGet:
                            path: /health
                            port: 8080
                        initialDelaySeconds: 15
                        periodSeconds: 10
                    readinessProbe:
                        httpGet:
                            path: /health
                            port: 8080
                        initialDelaySeconds: 15
                        failureThreshold: 2
                        periodSeconds: 10
                    envFrom:
                      - configMapRef:
                            name: catalogue
                    resources:
                        requests:
                            memory: "128Mi"
                            cpu: "250m"
                        limits:
                            memory: "256Mi"
                            cpu: "350m"
                        