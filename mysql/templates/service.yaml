apiVersion: v1
kind: Service
metadata:
    name: mysql
    namespace: roboshop
spec:
    selector:
        project: roboshop
        tier: database
        service: mysql
    ports:
        - protocol: TCP
          port: 3306
          targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
    name: mysql-headless
    namespace: roboshop
spec:
    clusterIP: None
    selector:
        project: roboshop
        tier: database
        service: mysql
    ports:
        - protocol: TCP
          port: 3306
          targetPort: 3306