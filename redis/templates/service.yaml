apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    service: redis
spec:
  selector:
    project: roboshop
    tier: database
    service: redis
    ports:
      - protocol: TCP
        port: 6379
        targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    service: redis
spec:
  clusterIP: None
    selector:
        project: roboshop
        tier: database
        service: redis
    ports:
        - protocol: TCP
          port: 6379
          targetPort: 6379