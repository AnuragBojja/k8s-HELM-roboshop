apiVersion: v1
kind: Service
metadata:
    name: mongodb
    namespace: roboshop
    labels:
        project: roboshop
        tier: database
        service: mongodb
spec:
    selector:
        project: roboshop
        tier: database
        env: dev
    ports:
        - protocol: TCP
          port: 27017
          targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
    name: mongodb-headless
    namespace: roboshop
    labels:
        project: roboshop
        tier: database
        service: mongodb
spec:
    clusterIP: None
    selector:
        project: roboshop
        tier: database
        env: dev
    ports:
        - protocol: TCP
          port: 27017
          targetPort: 27017