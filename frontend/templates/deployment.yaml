apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend
    namespace: roboshop
    labels:
        project: roboshop
        tier: frontend
        service: frontend
spec:
    replicas: 1
    selector:
        matchLabels:
            project: roboshop
            tier: frontend
            service: frontend
    template:
        metadata:
            labels:
                project: roboshop
                tier: frontend
                service: frontend
        spec:
            containers:
                  - name: frontend
                    image: ""{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"
                    imagePullPolicy: Always
                    ports:
                        - containerPort: 8080
                    livenessProbe:
                        httpGet:
                            path: /
                            port: 8080
                        initialDelaySeconds: 15
                        periodSeconds: 10
                    readinessProbe:
                        httpGet:
                            path: /
                            port: 8080
                        initialDelaySeconds: 15
                        periodSeconds: 10
                    resources:
                        requests:
                            memory: "128Mi"
                            cpu: "250m"
                        limits:
                            memory: "256Mi"
                            cpu: "350m"
                    volumeMounts:
                      - name: config
                        mountPath: /etc/nginx/nginx.conf
                        subPath: nginx.conf
            volumes:
              - name: config
                configMap:
                    name: frontend

