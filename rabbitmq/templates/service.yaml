apiVersion: v1
kind: Service 
metadata:
  name: rabbitmq
  namespace: roboshop
  labels: 
    project: roboshop
    tier: database
    service: rabbitmq
spec:
  selector:
    project: roboshop
    tier: database
    service: rabbitmq
  ports:
    - protocol: TCP
      port: 5672 
      targetPort: 5672 
---
apiVersion: v1
kind: Service 
metadata:
  name: rabbitmq-headless
  namespace: roboshop
  labels: 
    project: roboshop
    tier: database
    service: rabbitmq
spec:
  clusterIP: None
  selector:
    project: roboshop
    tier: database
    service: rabbitmq
  ports:
    - protocol: TCP
      port: 5672 
      targetPort: 5672 